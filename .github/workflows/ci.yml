name: CI

# This project's deps.edn pins langgraph-clj via a top-level git
# coordinate (`io.github.com-junkawasaki/langgraph-clj`), and the
# `:dev-local` alias overrides both it and its transitive langchain-clj
# dependency to the in-monorepo checkouts at `../../kotoba-lang/langgraph`
# / `../../kotoba-lang/langchain`. Those relative paths don't resolve on
# a bare single-repo checkout, so the test job reconstructs the
# workspace layout by checking out both siblings (all PUBLIC) into the
# expected relative paths -- no token needed. Same sibling-checkout
# pattern as cloud-itonami-isic-869 / cloud-itonami-isic-0115.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-1430 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (advisor · governor · phase · store contract · operation, real compiled StateGraph end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-1430
        run: clojure -M:dev-local:test
      - name: demo runner (compiled StateGraph, end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-1430
        run: clojure -M:dev-local:run
